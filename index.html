<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼盾金額隨機測驗</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #1976d2; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem; }
        .score-board { font-size: 1.1rem; margin-bottom: 1.5rem; color: #666; background: #eee; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .audio-section { margin-bottom: 2rem; }
        .play-btn { background: linear-gradient(135deg, #ff9800, #f57c00); border: none; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 6px 15px rgba(245,124,0,0.3); }
        .play-btn:hover { transform: scale(1.05); }
        .play-btn svg { fill: white; width: 45px; height: 45px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 1rem; }
        .option { padding: 18px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1.2rem; transition: all 0.2s; background: #fff; }
        .option:hover { border-color: var(--secondary); background: #f0f7ff; }
        .correct { background-color: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32; }
        .wrong { background-color: #ffebee !important; border-color: #f44336 !important; color: #c62828; }
        .feedback { margin-top: 1.5rem; height: 24px; font-weight: bold; font-size: 1.1rem; }
        button#next-btn { margin-top: 1.5rem; padding: 15px; background-color: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; display: none; width: 100%; font-size: 1.1rem; font-weight: bold; }
        .hint { font-size: 0.8rem; color: #999; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇮🇩 印尼盾聽力挑戰</h1>
    <div class="score-board">當前得分: <span id="score">0</span></div>
    
    <div class="audio-section">
        <button class="play-btn" onclick="playAudio()">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <p style="margin-top:15px; font-weight:bold;">聽聽看是多少錢？</p>
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="options-grid" id="options"></div>

    <button id="next-btn" onclick="nextQuestion()">下一題 (Next)</button>
    <p class="hint">提示：印尼語中的百(Ratus)、千(Ribu)、百萬(Juta)</p>
</div>

<script>
    let currentAmount = 0;
    let score = 0;

    // 隨機金額產生器
    function generateRandomAmount() {
        const types = [
            () => (Math.floor(Math.random() * 9) + 1) * 1000000, // 百萬整數
            () => (Math.floor(Math.random() * 900) + 100) * 1000, // 幾十萬整數
            () => (Math.floor(Math.random() * 50) + 1) * 50000,  // 5萬倍數
            () => Math.floor(Math.random() * 999 + 1) * 1000 + (Math.random() > 0.5 ? 500 : 0), // 帶碎數的千位
            () => (Math.floor(Math.random() * 10) + 1) * 1250000 // 複雜大額
        ];
        return types[Math.floor(Math.random() * types.length)]();
    }

    // 產生干擾選項 (故意產生看起來很像的數字)
    function generateDistractors(correct) {
        let choices = new Set([correct]);
        while (choices.size < 4) {
            let offset = [10, 0.1, 2, 0.5][Math.floor(Math.random() * 4)];
            let fake = Math.random() > 0.5 ? correct * offset : correct + (Math.random() > 0.5 ? 10000 : -5000);
            if (fake > 0 && fake !== correct) choices.add(Math.floor(fake));
            
            // 如果還是不夠，隨機補一個
            if (choices.size < 4) choices.add(generateRandomAmount());
        }
        return Array.from(choices).sort(() => Math.random() - 0.5);
    }

    function nextQuestion() {
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        currentAmount = generateRandomAmount();
        let choices = generateDistractors(currentAmount);

        choices.forEach(val => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = 'Rp ' + val.toLocaleString('id-ID');
            btn.onclick = () => checkAnswer(val, btn);
            optionsContainer.appendChild(btn);
        });

        playAudio();
    }

    function playAudio() {
        // 先停止之前的播放
        window.speechSynthesis.cancel();
        
        const msg = new SpeechSynthesisUtterance();
        msg.text = currentAmount + " Rupiah";
        msg.lang = 'id-ID'; 
        msg.rate = 0.85;    
        msg.pitch = 1;
        window.speechSynthesis.speak(msg);
    }

    function checkAnswer(selected, element) {
        if (document.getElementById('next-btn').style.display === 'block') return;

        const allOptions = document.querySelectorAll('.option');
        if (selected === currentAmount) {
            element.classList.add('correct');
            document.getElementById('feedback').innerText = '正解！👍';
            document.getElementById('feedback').style.color = '#4caf50';
            score += 10;
        } else {
            element.classList.add('wrong');
            document.getElementById('feedback').innerText = '答錯了，再聽一次 👂';
            document.getElementById('feedback').style.color = '#f44336';
            allOptions.forEach(opt => {
                if(opt.innerText === 'Rp ' + currentAmount.toLocaleString('id-ID')) {
                    opt.classList.add('correct');
                }
            });
        }
        document.getElementById('score').innerText = score;
        document.getElementById('next-btn').style.display = 'block';
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
