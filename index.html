<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼盾百億級聽力挑戰 - 音效強化版</title>
    <style>
        :root { --primary: #c62828; --accent: #1565c0; --success: #2e7d32; --bg: #263238; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #eceff1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #37474f; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; width: 95%; max-width: 600px; border: 1px solid #546e7a; }
        .level-badge { background: #ffca28; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; display: inline-block; text-transform: uppercase; }
        h1 { margin: 10px 0; font-size: 1.8rem; letter-spacing: 1px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .main-btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.8rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        #play-btn { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(198,40,40,0.4); }
        #next-btn { background: var(--accent); color: white; }
        .main-btn:active { transform: scale(0.9); }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; transition: opacity 0.5s; }
        @media (min-width: 480px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        .opt { background: #455a64; border: 2px solid #546e7a; padding: 18px; border-radius: 15px; cursor: pointer; font-size: 1.1rem; color: white; font-weight: 600; transition: 0.2s; }
        .opt:hover { border-color: #ffca28; background: #546e7a; }
        .hidden { opacity: 0; pointer-events: none; }

        .display-area { margin-top: 25px; min-height: 100px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.3); border: 1px dashed #546e7a; }
        .correct-msg { color: #81c784; font-size: 1.2rem; font-weight: bold; }
        .spell-out { font-size: 1.1rem; color: #ffca28; margin-top: 10px; display: block; font-weight: bold; }
        .control-panel { margin-top: 15px; font-size: 0.9rem; color: #90a4ae; }
    .short-form-tip {
    background: rgba(77, 182, 172, 0.1);
    border-left: 3px solid #4db6ac;
    padding: 5px 10px;
    display: inline-block;
    border-radius: 4px;
}

</style>
</head>
<body>

<div class="card">
    <div id="unit-label" class="level-badge">準備開始</div>
    <h1>印尼盾聽力挑戰</h1>
    <p style="color: #b0bec5; font-size: 0.85rem;">先聽 🔊，聽完選項才會出現喔！</p>
    
    <div class="btn-group">
        <button id="play-btn" class="main-btn" title="聽發音">🔊</button>
        <button id="next-btn" class="main-btn" title="下一題">⏭️</button>
    </div>

    <div class="options-grid hidden" id="options"></div>

    <div class="display-area" id="display-area">
        <span style="color: #78909c;">點擊 🔊 開始訓練你的印尼語耳朵</span>
    </div>

    <div class="control-panel">
        語速：<input type="range" id="rate-ctrl" min="0.4" max="1" step="0.1" value="0.7">
    </div>
</div>

<script>
    let currentAmount = 0;
    let hasHeard = false;
    const synth = window.speechSynthesis;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // --- 音效合成器 ---
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'correct') {
    osc.type = 'sine'; // 使用圓潤的正弦波
    
    // 「叮」：起音高頻
    osc.frequency.setValueAtTime(659.25, now); // E5
    
    // 「咚」：在 0.15 秒後降到低頻
    osc.frequency.exponentialRampToValueAtTime(523.25, now + 0.15); // C5
    
    // 音量淡出：讓聲音有餘韻
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6); 
    
    osc.start(now);
    osc.stop(now + 0.6);
        } else if (type === 'wrong') {
    osc.type = 'square'; // 具備電玩警示感
    osc.frequency.setValueAtTime(220, now); // 起音頻率 (A3)
    osc.frequency.linearRampToValueAtTime(110, now + 0.2); // 0.2秒內降到極低音
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.2); 
    osc.start(now);
    osc.stop(now + 0.2);
        }
    }

    function generateAmount() {
        const ranges = [
            { min: 1000, max: 99000 }, { min: 100000, max: 999000 },
            { min: 1000000, max: 99000000 }, { min: 100000000, max: 999000000 },
            { min: 1000000000, max: 10000000000 }
        ];
        const range = ranges[Math.floor(Math.random() * ranges.length)];
        const raw = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
        const step = raw > 1000000 ? 100000 : 1000;
        return Math.floor(raw / step) * step;
    }

    function terbilang(n) {
        if (n === 0) return "";
        const words = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
        if (n < 12) return words[n];
        if (n < 20) return terbilang(n - 10) + " Belas";
        if (n < 100) return (n < 20 ? words[n] : terbilang(Math.floor(n / 10)) + " Puluh ") + terbilang(n % 10);
        if (n < 200) return "Seratus " + terbilang(n - 100);
        if (n < 1000) return terbilang(Math.floor(n / 100)) + " Ratus " + terbilang(n % 100);
        if (n < 2000) return "Seribu " + terbilang(n - 1000);
        if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " Ribu " + terbilang(n % 1000);
        if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + " Juta " + terbilang(n % 1000000);
        if (n < 1000000000000) return terbilang(Math.floor(n / 1000000000)) + " Miliar " + terbilang(n % 1000000000);
        return n.toString();
    }

function getShortForm(n) {
    if (n >= 1000000000) {
        return (n / 1000000000).toLocaleString('id-ID') + " M (Miliar)";
    } else if (n >= 1000000) {
        return (n / 1000000).toLocaleString('id-ID') + " jt (Juta)";
    } else if (n >= 1000) {
        return (n / 1000).toLocaleString('id-ID') + " rb (Ribu)";
    }
    return n.toString();
}
    function formatRp(n) { return "Rp " + n.toLocaleString('id-ID'); }

    function nextQuestion() {
        currentAmount = generateAmount();
        hasHeard = false;
        document.getElementById('display-area').innerHTML = '<span style="color: #78909c;">請先聽語音...</span>';
        document.getElementById('options').classList.add('hidden');
        document.getElementById('unit-label').innerText = "挑戰中...";

        let choices = [currentAmount];
        const distractorLogic = [currentAmount * 10, currentAmount / 10, currentAmount + 100000, currentAmount - 1000];
        distractorLogic.forEach(val => {
            let v = Math.floor(Math.abs(val));
            if (v > 0 && v !== currentAmount && choices.length < 4) choices.push(v);
        });
        while(choices.length < 4) {
            let randomOffset = currentAmount * (Math.random() > 0.5 ? 1.1 : 0.9);
            choices.push(Math.floor(randomOffset / 1000) * 1000);
        }
        choices.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options');
        grid.innerHTML = "";
        choices.forEach(amt => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = formatRp(amt);
            b.onclick = () => checkAnswer(amt);
            grid.appendChild(b);
        });
    }

    function checkAnswer(amt) {
        const display = document.getElementById('display-area');
        if(amt === currentAmount) {
            playSound('correct'); // 播放答對音效
            display.innerHTML = `
                <div class="correct-msg">✓ Bagus! 正確答案</div>
               <div class="spell-out">${terbilang(currentAmount)} Rupiah</div>
            <div style="color: #90a4ae; font-size: 0.9rem; margin-top: 5px;">
                當地口語常說：<span style="color: #4db6ac; font-weight: bold;">${getShortForm(currentAmount)}</span>
            </div>
        `;
            document.getElementById('unit-label').innerText = "答對了！";
        } else {
            playSound('wrong'); // 播放答錯音效
            display.innerHTML = `<div style="color:#e57373; font-size: 1.6rem; font-weight: bold;">Salah! 再聽一次</div>`;
        }
    }

    function speak() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(terbilang(currentAmount));
        utterance.lang = 'id-ID';
        utterance.rate = document.getElementById('rate-ctrl').value;
        
        utterance.onstart = () => { document.getElementById('play-btn').style.boxShadow = "0 0 30px #ffca28"; };
        utterance.onend = () => {
            document.getElementById('play-btn').style.boxShadow = "";
            document.getElementById('options').classList.remove('hidden');
            if(!hasHeard) {
                document.getElementById('display-area').innerHTML = '<span style="color: #81c784;">請選擇正確金額</span>';
                hasHeard = true;
            }
        };
        synth.speak(utterance);
    }

    document.getElementById('play-btn').onclick = speak;
    document.getElementById('next-btn').onclick = nextQuestion;
    window.onload = nextQuestion;
</script>

</body>
</html>
